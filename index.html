<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>بطاش قيمر — Free Fire</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070D;--gold:#FFD700;--gold-d:#B8860B;
  --fire:#FF4500;--ember:#FF1744;--blaze:#FFA500;
  --txt:#fff;--txt2:rgba(255,215,0,.5);--txt3:rgba(255,255,255,.28);
  --card:rgba(255,215,0,.02);--bdr:rgba(255,215,0,.06);
  --fb:#1877F2;--ig:#E1306C;--tt:#FF0050;--kc:#53FC18;--wa:#25D366;--yt:#FF0000;
}
html{scroll-behavior:smooth}
::selection{background:rgba(255,215,0,.25);color:#fff}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:10px}
body{
  font-family:'Rajdhani','Cairo',sans-serif;background:var(--bg);color:var(--txt);
  min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
}

.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.03;
  background-image:linear-gradient(rgba(255,215,0,.5) 1px,transparent 1px),linear-gradient(90deg,rgba(255,215,0,.5) 1px,transparent 1px);
  background-size:60px 60px}
.bg-grad{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(130px);opacity:.3;animation:bF 14s ease-in-out infinite alternate}
.bg-blob:nth-child(1){width:500px;height:500px;top:-20%;left:-10%;background:radial-gradient(circle,rgba(255,69,0,.2),transparent 70%);animation-duration:16s}
.bg-blob:nth-child(2){width:600px;height:600px;bottom:-25%;right:-15%;background:radial-gradient(circle,rgba(255,215,0,.15),transparent 70%);animation-duration:20s;animation-delay:-5s}
.bg-blob:nth-child(3){width:400px;height:400px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(255,23,68,.08),transparent 70%);animation-duration:18s;animation-delay:-10s}
@keyframes bF{0%{transform:translate(0,0) scale(1)}33%{transform:translate(50px,-30px) scale(1.1)}66%{transform:translate(-40px,40px) scale(.9)}100%{transform:translate(30px,20px) scale(1.05)}}

#fireCanvas{position:fixed;inset:0;z-index:1;pointer-events:none}

#killFeed{position:fixed;top:14px;right:14px;z-index:9990;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.kill-msg{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:4px;background:rgba(0,0,0,.9);border:1px solid rgba(255,215,0,.12);backdrop-filter:blur(12px);font-size:12px;font-weight:600;color:var(--txt);transform:translateX(120%);animation:kS .35s cubic-bezier(.16,1,.3,1) forwards;white-space:nowrap}
.kill-msg.out{animation:kO .25s ease forwards}
@keyframes kS{to{transform:translateX(0)}}
@keyframes kO{to{transform:translateX(120%);opacity:0}}
.kill-platform{color:var(--gold);font-weight:700}

.dmg-num{position:fixed;pointer-events:none;z-index:9988;font-family:'Orbitron';font-weight:900;font-size:22px;color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,.6);animation:dF .7s ease-out forwards}
.dmg-num.crit{font-size:30px;color:var(--fire);text-shadow:0 0 15px rgba(255,69,0,.7)}
@keyframes dF{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-35px) scale(1.2)}100%{opacity:0;transform:translateY(-70px) scale(.8)}}

main{position:relative;z-index:3;max-width:500px;margin:0 auto;padding:48px 14px 56px;min-height:100vh;display:flex;flex-direction:column;align-items:center}

.rank-badge{display:inline-flex;align-items:center;gap:7px;padding:5px 16px 5px 10px;border-radius:5px;background:linear-gradient(135deg,rgba(255,215,0,.07),rgba(255,69,0,.04));border:1px solid rgba(255,215,0,.1);font-family:'Orbitron';font-size:10px;font-weight:700;letter-spacing:3px;color:var(--gold);margin-bottom:28px;position:relative;overflow:hidden;animation:fU .6s ease forwards}
.rank-badge::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,215,0,.04),transparent);animation:bS 3s ease infinite}
@keyframes bS{0%,100%{transform:translateX(-100%)}50%{transform:translateX(100%)}}

.profile{text-align:center;margin-bottom:32px;opacity:0;transform:translateY(20px);animation:fU .7s cubic-bezier(.16,1,.3,1) forwards .15s}
@keyframes fU{to{opacity:1;transform:translateY(0)}}

.avatar-container{position:relative;width:120px;height:120px;margin:0 auto 20px}
.fire-ring{position:absolute;inset:-5px;border-radius:50%;background:conic-gradient(from 0deg,var(--gold),var(--blaze),var(--fire),var(--ember),var(--fire),var(--blaze),var(--gold));animation:fRS 4s linear infinite;filter:blur(1px)}
.fire-ring::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--bg)}
@keyframes fRS{to{transform:rotate(360deg)}}
.fire-glow{position:absolute;inset:-18px;border-radius:50%;background:radial-gradient(circle,rgba(255,69,0,.15),transparent 70%);animation:fGP 2s ease-in-out infinite}
@keyframes fGP{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
.avatar-img{position:absolute;inset:5px;border-radius:50%;z-index:1;width:calc(100% - 10px);height:calc(100% - 10px);object-fit:cover;animation:aFl 5s ease-in-out infinite}
@keyframes aFl{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

.glitch-name{font-family:'Cairo';font-weight:900;font-size:clamp(28px,7vw,36px);position:relative;display:inline-block;margin-bottom:6px;background:linear-gradient(135deg,#fff 30%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.glitch-name::before,.glitch-name::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%}
.glitch-name::before{-webkit-text-fill-color:var(--fire);animation:gn1 4s infinite linear;clip-path:polygon(0 0,100% 0,100% 30%,0 30%)}
.glitch-name::after{-webkit-text-fill-color:var(--blaze);animation:gn2 3s infinite linear;clip-path:polygon(0 70%,100% 70%,100% 100%,0 100%)}
@keyframes gn1{0%,90%,100%{transform:translate(0)}92%{transform:translate(-3px,1px)}94%{transform:translate(3px,-1px)}96%{transform:translate(-2px,1px)}98%{transform:translate(2px,-1px)}}
@keyframes gn2{0%,88%,100%{transform:translate(0)}90%{transform:translate(2px,-1px)}93%{transform:translate(-2px,1px)}95%{transform:translate(1px,1px)}97%{transform:translate(-3px,-1px)}}

.bio-row{display:flex;align-items:center;justify-content:center;gap:3px;margin-bottom:16px;min-height:20px}
.bio-text{font-size:13px;color:var(--txt2);font-family:'Cairo'}
.cursor-blink{display:inline-block;width:2px;height:13px;background:var(--gold);margin-left:1px;vertical-align:middle;animation:blk .7s step-end infinite}
@keyframes blk{0%,100%{opacity:1}50%{opacity:0}}

.online-badge{display:inline-flex;align-items:center;gap:7px;padding:6px 18px;border-radius:50px;background:rgba(83,252,24,.04);border:1px solid rgba(83,252,24,.1);font-size:10px;color:var(--kc);font-weight:700;font-family:'Orbitron';letter-spacing:2px}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--kc);position:relative}
.online-dot::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1.5px solid var(--kc);opacity:0;animation:dP 2s ease infinite}
@keyframes dP{0%{transform:scale(.5);opacity:.8}100%{transform:scale(2);opacity:0}}

.links{width:100%;display:flex;flex-direction:column;gap:11px}

.link-card{
  position:relative;display:block;text-decoration:none;color:inherit;
  overflow:hidden;cursor:pointer;
  opacity:0;transform:translateY(25px);will-change:transform;
  transition:transform .45s cubic-bezier(.25,.46,.45,.94),box-shadow .45s ease;
  background:var(--card);border:1px solid var(--bdr);
  clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
}
.link-card.visible{opacity:1;transform:translateY(0)}
.link-card:hover{transform:translateY(-3px) scale(1.02)}

.holo{position:absolute;inset:0;pointer-events:none;z-index:4;
  background:linear-gradient(105deg,transparent 38%,rgba(255,255,255,.02) 42%,rgba(255,255,255,.07) 47%,rgba(255,255,255,.02) 52%,transparent 56%);
  transform:translateX(-120%);transition:transform .65s cubic-bezier(.25,.46,.45,.94)}
.link-card:hover .holo{transform:translateX(60%)}

.card-edge{position:absolute;inset:0;pointer-events:none;z-index:1;opacity:0;transition:opacity .45s}
.link-card:hover .card-edge{opacity:1}
.card-bg{position:absolute;inset:0;opacity:0;transition:opacity .45s;pointer-events:none;z-index:0}
.link-card:hover .card-bg{opacity:1}

.rarity-bar{position:absolute;top:0;left:0;width:3px;height:100%;z-index:5;border-radius:0 2px 2px 0}
.rarity-tag{position:absolute;top:7px;right:10px;z-index:5;font-family:'Orbitron';font-size:6px;font-weight:800;letter-spacing:1.5px;padding:2px 7px;border-radius:3px;opacity:.6}

.card-ripple{position:absolute;border-radius:50%;pointer-events:none;z-index:6;animation:rO .55s ease forwards}
@keyframes rO{to{transform:scale(4);opacity:0}}

.card-inner{position:relative;display:flex;align-items:center;gap:12px;padding:14px 18px 14px 16px;z-index:3}
.icn{width:46px;height:46px;min-width:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s,background .35s;position:relative}
.icn::after{content:'';position:absolute;inset:0;border-radius:11px;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);opacity:0;transition:opacity .35s}
.link-card:hover .icn::after{opacity:1}
.icn svg{width:19px;height:19px;fill:#fff;position:relative;z-index:1}
.link-card:hover .icn{transform:scale(1.12) rotate(-3deg)}

.info{flex:1;display:flex;flex-direction:column;gap:2px}
.plat-name{font-weight:800;font-size:14px;letter-spacing:.3px}
.plat-sub{font-size:11px;color:var(--txt3);font-family:'Cairo'}
.live-tag{display:inline-flex;align-items:center;gap:3px;font-size:6px;font-weight:900;text-transform:uppercase;letter-spacing:1px;padding:2px 6px;border-radius:2px;font-family:'Orbitron'}
.live-dot-sm{width:4px;height:4px;border-radius:50%;animation:dP 1.5s ease infinite}

.notif{min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#fff;padding:0 5px;font-family:'Orbitron';position:relative}
.notif::after{content:'';position:absolute;inset:0;border-radius:10px;animation:nP 2s ease infinite}
@keyframes nP{0%{box-shadow:0 0 0 0 currentColor}70%{box-shadow:0 0 0 5px transparent}100%{box-shadow:0 0 0 0 transparent}}

.arrow-box{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.02);transition:all .35s;min-width:28px}
.arrow{font-size:13px;color:var(--txt3);transition:transform .35s cubic-bezier(.34,1.56,.64,1),color .35s}
.link-card:hover .arrow-box{background:rgba(255,255,255,.04)}
.link-card:hover .arrow{transform:translateX(3px)}

[data-p="fb"] .rarity-bar{background:linear-gradient(to bottom,var(--fb),rgba(24,119,242,.3))}
[data-p="fb"] .rarity-tag{background:rgba(24,119,242,.1);color:var(--fb);border:1px solid rgba(24,119,242,.15)}
[data-p="fb"] .card-edge{background:linear-gradient(135deg,rgba(24,119,242,.15),transparent 50%)}
[data-p="fb"] .card-bg{background:linear-gradient(135deg,rgba(24,119,242,.05),transparent 60%)}
[data-p="fb"] .icn{background:rgba(24,119,242,.1)}
[data-p="fb"]:hover{box-shadow:0 5px 40px rgba(24,119,242,.12),0 0 0 1px rgba(24,119,242,.12)}
[data-p="fb"]:hover .icn{background:var(--fb);box-shadow:0 4px 20px rgba(24,119,242,.4)}
[data-p="fb"]:hover .arrow{color:var(--fb)}
[data-p="fb"] .notif{background:var(--fb);color:var(--fb)}
[data-p="fb"] .notif::after{color:rgba(24,119,242,.3)}

[data-p="ig"] .rarity-bar{background:linear-gradient(to bottom,#f09433,#dc2743,#bc1888)}
[data-p="ig"] .rarity-tag{background:rgba(225,48,108,.08);color:var(--ig);border:1px solid rgba(225,48,108,.15)}
[data-p="ig"] .card-edge{background:linear-gradient(135deg,rgba(225,48,108,.15),rgba(188,24,136,.08) 50%)}
[data-p="ig"] .card-bg{background:linear-gradient(135deg,rgba(225,48,108,.05),transparent 60%)}
[data-p="ig"] .icn{background:rgba(225,48,108,.1)}
[data-p="ig"]:hover{box-shadow:0 5px 40px rgba(225,48,108,.12),0 0 0 1px rgba(225,48,108,.12)}
[data-p="ig"]:hover .icn{background:var(--ig);box-shadow:0 4px 20px rgba(225,48,108,.4)}
[data-p="ig"]:hover .arrow{color:var(--ig)}
[data-p="ig"] .notif{background:var(--ig);color:var(--ig)}
[data-p="ig"] .notif::after{color:rgba(225,48,108,.3)}

[data-p="tt"] .rarity-bar{background:linear-gradient(to bottom,#00f2ea,var(--tt))}
[data-p="tt"] .rarity-tag{background:rgba(255,0,80,.08);color:var(--tt);border:1px solid rgba(255,0,80,.15)}
[data-p="tt"] .card-edge{background:linear-gradient(135deg,rgba(255,0,80,.15),rgba(0,242,234,.08) 50%)}
[data-p="tt"] .card-bg{background:linear-gradient(135deg,rgba(255,0,80,.05),transparent 60%)}
[data-p="tt"] .icn{background:rgba(255,0,80,.1)}
[data-p="tt"]:hover{box-shadow:0 5px 40px rgba(255,0,80,.12),0 0 0 1px rgba(255,0,80,.12)}
[data-p="tt"]:hover .icn{background:var(--tt);box-shadow:0 4px 20px rgba(255,0,80,.4)}
[data-p="tt"]:hover .arrow{color:var(--tt)}
[data-p="tt"] .live-tag{background:rgba(255,0,80,.1);color:var(--tt)}
[data-p="tt"] .live-dot-sm{background:var(--tt)}

[data-p="kc"] .rarity-bar{background:linear-gradient(to bottom,var(--kc),rgba(83,252,24,.3))}
[data-p="kc"] .rarity-tag{background:rgba(83,252,24,.06);color:var(--kc);border:1px solid rgba(83,252,24,.12)}
[data-p="kc"] .card-edge{background:linear-gradient(135deg,rgba(83,252,24,.12),transparent 50%)}
[data-p="kc"] .card-bg{background:linear-gradient(135deg,rgba(83,252,24,.05),transparent 60%)}
[data-p="kc"] .icn{background:rgba(83,252,24,.1)}
[data-p="kc"]:hover{box-shadow:0 5px 40px rgba(83,252,24,.12),0 0 0 1px rgba(83,252,24,.12)}
[data-p="kc"]:hover .icn{background:var(--kc);box-shadow:0 4px 20px rgba(83,252,24,.4)}
[data-p="kc"]:hover .arrow{color:var(--kc)}
[data-p="kc"] .live-tag{background:rgba(83,252,24,.06);color:var(--kc)}
[data-p="kc"] .live-dot-sm{background:var(--kc)}

[data-p="wa"] .rarity-bar{background:linear-gradient(to bottom,var(--wa),rgba(37,211,102,.3))}
[data-p="wa"] .rarity-tag{background:rgba(37,211,102,.06);color:var(--wa);border:1px solid rgba(37,211,102,.12)}
[data-p="wa"] .card-edge{background:linear-gradient(135deg,rgba(37,211,102,.12),transparent 50%)}
[data-p="wa"] .card-bg{background:linear-gradient(135deg,rgba(37,211,102,.05),transparent 60%)}
[data-p="wa"] .icn{background:rgba(37,211,102,.1)}
[data-p="wa"]:hover{box-shadow:0 5px 40px rgba(37,211,102,.12),0 0 0 1px rgba(37,211,102,.12)}
[data-p="wa"]:hover .icn{background:var(--wa);box-shadow:0 4px 20px rgba(37,211,102,.4)}
[data-p="wa"]:hover .arrow{color:var(--wa)}
[data-p="wa"] .notif{background:var(--wa);color:var(--wa)}
[data-p="wa"] .notif::after{color:rgba(37,211,102,.3)}

[data-p="yt"] .rarity-bar{background:linear-gradient(to bottom,var(--yt),rgba(255,0,0,.3))}
[data-p="yt"] .rarity-tag{background:rgba(255,0,0,.06);color:var(--yt);border:1px solid rgba(255,0,0,.12)}
[data-p="yt"] .card-edge{background:linear-gradient(135deg,rgba(255,0,0,.12),transparent 50%)}
[data-p="yt"] .card-bg{background:linear-gradient(135deg,rgba(255,0,0,.05),transparent 60%)}
[data-p="yt"] .icn{background:rgba(255,0,0,.1)}
[data-p="yt"]:hover{box-shadow:0 5px 40px rgba(255,0,0,.12),0 0 0 1px rgba(255,0,0,.12)}
[data-p="yt"]:hover .icn{background:var(--yt);box-shadow:0 4px 20px rgba(255,0,0,.4)}
[data-p="yt"]:hover .arrow{color:var(--yt)}
[data-p="yt"] .notif{background:var(--yt);color:var(--yt)}
[data-p="yt"] .notif::after{color:rgba(255,0,0,.3)}

.eq-wrap{display:flex;align-items:flex-end;justify-content:center;gap:2px;height:26px;margin-top:36px;opacity:0;animation:fU .5s ease forwards 1s}
.eq-bar{width:3px;border-radius:2px;background:linear-gradient(to top,var(--gold),var(--fire));animation:eqB var(--d) ease-in-out infinite alternate;opacity:.4}
@keyframes eqB{0%{height:var(--h1)}100%{height:var(--h2)}}

footer{margin-top:32px;text-align:center;opacity:0;animation:fU .5s ease forwards 1.1s}
.footer-line{width:40px;height:1px;margin:0 auto 12px;background:linear-gradient(90deg,transparent,var(--gold-d),transparent)}
footer p{font-size:10px;color:var(--txt3);font-family:'Cairo'}
footer span{color:var(--fire)}

@media(max-width:480px){
  main{padding:32px 10px 44px}
  .avatar-container{width:100px;height:100px}
  .fire-ring{inset:-4px}
  .fire-glow{inset:-14px}
  .card-inner{padding:12px 14px 12px 13px;gap:10px}
  .icn{width:40px;height:40px;min-width:40px;border-radius:9px}
  .icn svg{width:17px;height:17px}
  .plat-name{font-size:13px}
  .plat-sub{font-size:10px}
  .rank-badge{font-size:8px;padding:4px 12px 4px 8px}
  .link-card{clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px))}
  .kill-msg{font-size:10px;padding:6px 10px}
  #killFeed{top:8px;right:8px}
  .rarity-tag{display:none}
}
@media(max-width:340px){
  .icn{width:36px;height:36px;min-width:36px}
  .arrow-box{width:24px;height:24px;min-width:24px}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-grad"><div class="bg-blob"></div><div class="bg-blob"></div><div class="bg-blob"></div></div>
<canvas id="fireCanvas"></canvas>
<div id="killFeed"></div>

<main>

  <div class="rank-badge"><span>★ ★ ★ ★</span><span>HEROIC</span></div>

  <section class="profile">
    <div class="avatar-container">
      <div class="fire-glow"></div>
      <div class="fire-ring"></div>
      <img src="bat.jpeg" alt="بطاش قيمر" class="avatar-img">
    </div>
    <h1 class="glitch-name" data-text="بطاش قيمر">بطاش قيمر</h1>
    <div class="bio-row">
      <span class="bio-text" id="typewriter"></span>
      <span class="cursor-blink"></span>
    </div>
    <div class="online-badge"><span class="online-dot"></span>ONLINE</div>
  </section>

  <section class="links">

    <a href="https://www.facebook.com/btash1m?mibextid=ZbWKwL" target="_blank" rel="noopener noreferrer" class="link-card" data-p="fb" data-name="Facebook">
      <div class="rarity-bar"></div>
      <span class="rarity-tag">RARE</span>
      <div class="card-edge"></div>
      <div class="card-bg"></div>
      <div class="holo"></div>
      <div class="card-inner">
        <div class="icn"><svg viewBox="0 0 320 512"><path d="M279.14 288l14.22-92.66h-88.91v-60.13c0-25.35 12.42-50.06 52.24-50.06h40.42V6.26S260.43 0 225.36 0c-73.22 0-121.08 44.38-121.08 124.72v70.62H22.89V288h81.39v224h100.17V288z"/></svg></div>
        <div class="info">
          <span class="plat-name">Facebook</span>
          <span class="plat-sub">تابعني على فيسبوك</span>
        </div>
        <div class="arrow-box"><span class="arrow">→</span></div>
      </div>
    </a>

    <a href="https://www.instagram.com/btash1m?igsh=Nzd4eW8wZzdxeHFp" target="_blank" rel="noopener noreferrer" class="link-card" data-p="ig" data-name="Instagram">
      <div class="rarity-bar"></div>
      <span class="rarity-tag">EPIC</span>
      <div class="card-edge"></div>
      <div class="card-bg"></div>
