<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:     #07070D;
  --gold:   #FFD700;
  --fire:   #FF4500;
  --blaze:  #FFA500;
  --white:  #ffffff;
  --muted:  rgba(255,255,255,.35);
  --card:   rgba(255,255,255,.03);
  --border: rgba(255,215,0,.08);
  --fb: #1877F2;
  --ig: #E1306C;
  --tt: #FF0050;
  --kc: #53FC18;
  --wa: #25D366;
  --yt: #FF0000;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(255,69,0,.12) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 80% 90%, rgba(255,215,0,.07) 0%, transparent 70%);
  pointer-events: none;
}

.bg-grid {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,215,0,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,215,0,.03) 1px, transparent 1px);
  background-size: 50px 50px;
}

main {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 48px 16px 64px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.rank-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 5px 16px;
  border-radius: 4px;
  border: 1px solid rgba(255,215,0,.15);
  background: rgba(255,215,0,.04);
  font-family: 'Orbitron', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--gold);
  margin-bottom: 28px;
  animation: fadeUp .5s ease both;
}

.rank-stars { opacity: .7; }

.profile {
  text-align: center;
  margin-bottom: 32px;
  animation: fadeUp .5s ease both .1s;
}

.avatar-wrap {
  position: relative;
  width: 110px;
  height: 110px;
  margin: 0 auto 18px;
}

.ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: conic-gradient(var(--gold), var(--blaze), var(--fire), var(--blaze), var(--gold));
  animation: spin 6s linear infinite;
  filter: blur(.5px);
}

.ring::after {
  content: '';
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  background: var(--bg);
}

.avatar-glow {
  position: absolute;
  inset: -16px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,69,0,.2), transparent 70%);
  animation: pulse 2.5s ease-in-out infinite;
}

.avatar-img {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  display: block;
}

h1 {
  font-family: 'Cairo', sans-serif;
  font-weight: 900;
  font-size: clamp(26px, 6vw, 34px);
  background: linear-gradient(135deg, #fff 30%, var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
  line-height: 1.2;
}

.bio {
  font-size: 13px;
  color: rgba(255,215,0,.5);
  margin-bottom: 14px;
  min-height: 18px;
}

.bio::after {
  content: '|';
  animation: blink .7s step-end infinite;
  margin-right: 1px;
}

.online {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 5px 16px;
  border-radius: 50px;
  border: 1px solid rgba(83,252,24,.15);
  background: rgba(83,252,24,.04);
  font-family: 'Orbitron', sans-serif;
  font-size: 9px;
  color: var(--kc);
  letter-spacing: 2px;
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--kc);
  position: relative;
}

.dot::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 1.5px solid var(--kc);
  animation: ping 2s ease infinite;
}

.links {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 13px 16px;
  text-decoration: none;
  color: var(--white);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  position: relative;
  overflow: hidden;
  transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  animation: fadeUp .5s ease both;
}

.card::before {
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  border-radius: 0 10px 10px 0;
  background: var(--accent);
  opacity: .7;
}

.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,.04) 50%, transparent 60%);
  transform: translateX(-100%);
  transition: transform .5s ease;
}

.card:hover { transform: translateY(-2px) scale(1.01); }
.card:hover::after { transform: translateX(100%); }
.card:active { transform: scale(.98); }

.icon {
  width: 44px;
  height: 44px;
  min-width: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: color-mix(in srgb, var(--accent) 12%, transparent);
  transition: background .25s ease, transform .25s ease;
  flex-shrink: 0;
}

.card:hover .icon {
  background: var(--accent);
  transform: scale(1.1) rotate(-4deg);
  box-shadow: 0 4px 20px color-mix(in srgb, var(--accent) 40%, transparent);
}

.icon svg { width: 18px; height: 18px; fill: #fff; display: block; }

.info { flex: 1; min-width: 0; }
.info-name { font-weight: 700; font-size: 14px; line-height: 1.3; }
.info-sub  { font-size: 11px; color: var(--muted); margin-top: 1px; }

.badge {
  font-family: 'Orbitron', sans-serif;
  font-size: 7px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 3px;
  letter-spacing: 1px;
  background: color-mix(in srgb, var(--accent) 12%, transparent);
  color: var(--accent);
  border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
  white-space: nowrap;
}

.arr {
  font-size: 14px;
  color: var(--muted);
  transition: transform .25s ease, color .25s ease;
  flex-shrink: 0;
}

.card:hover .arr { transform: translateX(-3px); color: var(--accent); }
.card:hover { border-color: color-mix(in srgb, var(--accent) 20%, transparent); }

.eq {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 3px;
  height: 20px;
  margin-top: 32px;
  opacity: .3;
  animation: fadeUp .5s ease both .8s;
}

.eq span {
  width: 3px;
  border-radius: 2px;
  background: linear-gradient(to top, var(--gold), var(--fire));
  animation: eq var(--d, .8s) ease-in-out infinite alternate;
}

footer {
  margin-top: 24px;
  text-align: center;
  font-size: 10px;
  color: rgba(255,255,255,.2);
  animation: fadeUp .5s ease both .9s;
}

footer span { color: var(--fire); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes spin  { to { transform: rotate(360deg); } }
@keyframes pulse {
  0%, 100% { opacity: .5; transform: scale(1); }
  50%       { opacity: 1;  transform: scale(1.08); }
}
@keyframes ping {
  to { transform: scale(2.2); opacity: 0; }
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}
@keyframes eq {
  from { height: var(--h1, 4px); }
  to   { height: var(--h2, 18px); }
}

@media (max-width: 400px) {
  main { padding: 36px 12px 52px; }

  .icon svg { width: 17px; height: 17px; }
  .info-name { font-size: 13px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    transition-duration: .01ms !important;
  }
}
</style>
</head>

<script>
(function () {
  const phrases = [
    'Free Fire Player 🔥',
    'Heroic Ranked 🏆',
    'Content Creator 🎮',
    'يلا نشعل الميدان 💥',
  ];
  const el = document.getElementById('bio');
  let pi = 0, ci = 0, deleting = false;

  function tick() {
    const phrase = phrases[pi];
    el.textContent = deleting ? phrase.slice(0, ci--) : phrase.slice(0, ci++);

    if (!deleting && ci > phrase.length) {
      deleting = true;
      setTimeout(tick, 1800);
    } else if (deleting && ci < 0) {
      deleting = false;
      pi = (pi + 1) % phrases.length;
      setTimeout(tick, 400);
    } else {
      setTimeout(tick, deleting ? 45 : 80);
    }
  }
  tick();
})();
</script>
